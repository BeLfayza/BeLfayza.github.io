<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pre-Installed Games</title>

    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600&display=swap" rel="stylesheet">
    <link rel="icon" type="image/jpg" href="https://avatars.githubusercontent.com/u/98310665">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Oswald', sans-serif;
        }

        body {
            background: #0b001a;
            color: white;
            overflow-x: hidden;
        }

        /* Overlay gradient */
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background: linear-gradient(to right, rgba(0, 0, 0, 0.85) 40%, rgba(0, 0, 0, 0.4));
            z-index: 0;
        }

        canvas {
            position: fixed;
            inset: 0;
            z-index: 1;
        }

        .top-bar {
            position: relative;
            z-index: 2;
            padding: 40px 80px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .top-bar a {
            text-decoration: none;
            background: #5900ff;
            padding: 12px 25px;
            color: white;
            border-radius: 6px;
            transition: 0.3s;
        }

        .top-bar a:hover {
            box-shadow: 0 0 20px #5900ff;
            background: #7a2cff;
        }

        .top-bar h1 {
            font-size: 32px;
            letter-spacing: 4px;
            color: #5900ff;
        }

        .gallery {
            position: relative;
            z-index: 2;
            padding: 40px 80px 100px 80px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 25px;
        }

        .card {
            position: relative;
            width: 100%;
            aspect-ratio: 16/9;
            overflow: hidden;
            border-radius: 12px;
            cursor: pointer;
        }

        .card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: 0.4s;
        }

        .card:hover img {
            transform: scale(1.1);
        }

        .card::after {
            content: "";
            position: absolute;
            inset: 0;
            background: rgba(89, 0, 255, 0.3);
            opacity: 0;
            transition: 0.4s;
        }

        .card:hover::after {
            opacity: 1;
        }

        .card-title {
            position: absolute;
            bottom: 15px;
            left: 20px;
            font-size: 18px;
            letter-spacing: 2px;
            z-index: 3;
        }

        @media(max-width: 900px) {
            .gallery {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media(max-width: 600px) {
            .gallery {
                grid-template-columns: 1fr;
            }

            .top-bar {
                flex-direction: column;
                gap: 20px;
            }
        }
    </style>
</head>

<body>

    <canvas id="particles"></canvas>

    <div class="top-bar">
        <a href="https://belfayza.github.io/">BACK TO HOME</a>
        <h1>PRE-INSTALLED GAMES</h1>
    </div>

    <div class="gallery">

        <div class="card" onclick="location.href='https://belfayza.github.io/games/theotown'">
            <img src="thumbnail/theotown.jpg" alt="TheoTown">
            <div class="card-title">THEOTOWN</div>
        </div>

        <div class="card" onclick="location.href='https://belfayza.github.io/games/gtasan'">
            <img src="thumbnail/gtasan.jpg" alt="GTA SA">
            <div class="card-title">GTA SAN ANDREAS</div>
        </div>

        <div class="card" onclick="location.href='https://belfayza.github.io/games/dmc4'">
            <img src="thumbnail/dmc4.jpg" alt="DMC4">
            <div class="card-title">Devil May Cry 4</div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById("particles");
        const ctx = canvas.getContext("2d");

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        window.addEventListener("resize", () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

        let particles = [];

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = canvas.height + Math.random() * 100;
                this.size = Math.random() * 70 + 20;
                this.speedY = Math.random() * 5 + 5;
                this.opacity = Math.random() * 0.4 + 0.1;
            }

            update() {
                this.y -= this.speedY;
                if (this.y < -100) {
                    this.y = canvas.height + 50;
                    this.x = Math.random() * canvas.width;
                }
            }

            draw() {
                ctx.beginPath();
                let gradient = ctx.createRadialGradient(
                    this.x, this.y, 0,
                    this.x, this.y, this.size
                );
                gradient.addColorStop(0, `rgba(89,0,255,${this.opacity})`);
                gradient.addColorStop(1, "rgba(0,0,0,0)");
                ctx.fillStyle = gradient;
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function init() {
            for (let i = 0; i < 30; i++) {
                particles.push(new Particle());
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            requestAnimationFrame(animate);
        }

        init();
        animate();
    </script>

</body>

</html>
