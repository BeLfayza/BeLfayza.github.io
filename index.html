<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WASD</title>

    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600&display=swap" rel="stylesheet">
    <link rel="icon" type="image/jpg" href="https://avatars.githubusercontent.com/u/98310665">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Oswald', sans-serif;
        }

        body {
            height: 100vh;
            background: url('bg.png') center/cover no-repeat;
            display: flex;
            align-items: center;
            color: white;
            overflow: hidden;
        }

        /* Dark overlay */
        body::before {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(to right, rgba(0, 0, 0, 0.9) 40%, rgba(0, 0, 0, 0.3));
        }

        /* Canvas smoke */
        canvas {
            position: absolute;
            inset: 0;
            z-index: 1;
        }

        .menu {
            position: relative;
            z-index: 2;
            padding-left: 80px;
        }

        .menu h1 {
            font-size: 28px;
            margin-bottom: 25px;
            letter-spacing: 3px;
            color: #5900ff;
        }

        .menu ul {
            list-style: none;
        }

        .menu li {
            margin: 18px 0;
        }

        .menu a {
            text-decoration: none;
            color: white;
            font-size: 22px;
            letter-spacing: 2px;
            transition: 0.3s;
            position: relative;
        }

        .menu a:hover {
            color: #5900ff;
            text-shadow: 0 0 10px #5900ff;
            transform: translateX(10px);
        }

        .footer {
            position: absolute;
            bottom: 25px;
            left: 80px;
            font-size: 14px;
            opacity: 0.7;
        }
    </style>
</head>

<body>

    <canvas id="smoke"></canvas>

    <div class="menu">
        <h1>Random</h1>
        <ul>
            <li><a href="https://belfayza.github.io/games/">Games Archive</a></li>
            <li><a href="https://belfayza.github.io/snake-eater/">Snake</a></li>
            <li><a href="https://belfayza.github.io/yadayadadesu/">Mambo</a></li>
            <li><a href="https://github.com/BeLfayza">GitHub</a></li>
        </ul>
    </div>

    <div class="footer">
        "I've never been to school either."
    </div>

    <script>
        const canvas = document.getElementById("smoke");
        const ctx = canvas.getContext("2d");

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        window.addEventListener("resize", () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

        let particles = [];

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = canvas.height + Math.random() * 100;
                this.size = Math.random() * 60 + 20;
                this.speedY = Math.random() * 0.7 + 0.3;
                this.opacity = Math.random() * 0.3 + 0.1;
            }

            update() {
                this.y -= this.speedY;
                if (this.y < -100) {
                    this.y = canvas.height + 50;
                    this.x = Math.random() * canvas.width;
                }
            }

            draw() {
                ctx.beginPath();
                let gradient = ctx.createRadialGradient(
                    this.x, this.y, 0,
                    this.x, this.y, this.size
                );
                gradient.addColorStop(0, `rgba(255,255,255,${this.opacity})`);
                gradient.addColorStop(1, "rgba(0,0,0,0)");
                ctx.fillStyle = gradient;
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function init() {
            for (let i = 0; i < 35; i++) {
                particles.push(new Particle());
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            requestAnimationFrame(animate);
        }

        init();
        animate();
    </script>

</body>

</html>
